<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Vexra — Your AI Companion</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0f0f1a;
            height: 100vh;
            display: flex;
            flex-direction: column;
            color: #e0e0e0;
        }
        
        /* Header */
        .header {
            background: rgba(25, 25, 40, 0.95);
            backdrop-filter: blur(10px);
            padding: 16px 20px;
            border-bottom: 1px solid #2a2a3a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        
        .header h1 {
            font-size: 1.4rem;
            font-weight: 500;
            background: linear-gradient(135deg, #a78bfa, #ec489a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .facts-panel {
            background: rgba(0,0,0,0.4);
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .facts-panel:hover {
            background: rgba(0,0,0,0.6);
        }
        
        /* Chat Messages */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .message {
            display: flex;
            flex-direction: column;
            max-width: 85%;
            animation: fadeIn 0.3s ease;
        }
        
        .message.user {
            align-self: flex-end;
        }
        
        .message.vexra {
            align-self: flex-start;
        }
        
        .message-bubble {
            padding: 12px 16px;
            border-radius: 20px;
            line-height: 1.4;
            word-wrap: break-word;
        }
        
        .user .message-bubble {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-bottom-right-radius: 4px;
        }
        
        .vexra .message-bubble {
            background: #2a2a3a;
            border-bottom-left-radius: 4px;
        }
        
        .message-label {
            font-size: 0.7rem;
            margin-bottom: 4px;
            margin-left: 8px;
            opacity: 0.7;
        }
        
        /* Input Area */
        .input-container {
            background: #1a1a2a;
            padding: 16px 20px;
            border-top: 1px solid #2a2a3a;
            display: flex;
            gap: 12px;
            flex-shrink: 0;
        }
        
        .input-container input {
            flex: 1;
            background: #2a2a3a;
            border: none;
            padding: 12px 16px;
            border-radius: 28px;
            color: #e0e0e0;
            font-size: 1rem;
            outline: none;
            transition: 0.2s;
        }
        
        .input-container input:focus {
            background: #3a3a4a;
        }
        
        .input-container button {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border: none;
            padding: 12px 24px;
            border-radius: 28px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }
        
        .input-container button:hover {
            transform: scale(1.02);
            opacity: 0.9;
        }
        
        .input-container button:disabled {
            opacity: 0.5;
            transform: none;
        }
        
        /* Facts Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal-content {
            background: #1a1a2a;
            border-radius: 24px;
            padding: 24px;
            max-width: 400px;
            width: 90%;
            border: 1px solid #2a2a3a;
        }
        
        .modal-content h3 {
            margin-bottom: 16px;
            color: #a78bfa;
        }
        
        .modal-content pre {
            background: #0f0f1a;
            padding: 12px;
            border-radius: 12px;
            overflow-x: auto;
            font-size: 0.8rem;
        }
        
        .close-btn {
            margin-top: 16px;
            padding: 8px 16px;
            background: #2a2a3a;
            border: none;
            border-radius: 20px;
            color: white;
            cursor: pointer;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Typing indicator */
        .typing {
            background: #2a2a3a;
            padding: 12px 16px;
            border-radius: 20px;
            border-bottom-left-radius: 4px;
            display: inline-block;
        }
        
        .typing span {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #a78bfa;
            margin: 0 2px;
            animation: typing 1.4s infinite;
        }
        
        .typing span:nth-child(2) {
            animation-delay: 0.2s;
        }
        
        .typing span:nth-child(3) {
            animation-delay: 0.4s;
        }
        
        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
                opacity: 0.5;
            }
            30% {
                transform: translateY(-6px);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>💜 Vexra</h1>
        <div class="facts-panel" onclick="showFacts()">
            📝 {{ facts | length }} facts
        </div>
    </div>
    
    <div class="chat-container" id="chatContainer">
        <div class="message vexra">
            <div class="message-label">Vexra</div>
            <div class="message-bubble">*looks up from her phone* Hey. Ready to talk?</div>
        </div>
    </div>
    
    <div class="input-container">
        <input type="text" id="messageInput" placeholder="Type a message... (supports *actions*)" autofocus>
        <button id="sendBtn" onclick="sendMessage()">Send</button>
    </div>
    
    <!-- Facts Modal -->
    <div id="factsModal" class="modal">
        <div class="modal-content">
            <h3>📚 What Vexra Remembers</h3>
            <pre id="factsContent">{{ facts | tojson(indent=2) }}</pre>
            <button class="close-btn" onclick="closeModal()">Close</button>
        </div>
    </div>
    
    <script>
        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        
        let isWaiting = false;
        
        // Auto-scroll to bottom
        function scrollToBottom() {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
        
        // Show typing indicator
        function showTyping() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message vexra';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = `
                <div class="message-label">Vexra</div>
                <div class="typing">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            `;
            chatContainer.appendChild(typingDiv);
            scrollToBottom();
        }
        
        // Remove typing indicator
        function removeTyping() {
            const typing = document.getElementById('typingIndicator');
            if (typing) typing.remove();
        }
        
        // Add message to chat
        function addMessage(role, text) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            messageDiv.innerHTML = `
                <div class="message-label">${role === 'user' ? 'You' : 'Vexra'}</div>
                <div class="message-bubble">${escapeHtml(text)}</div>
            `;
            chatContainer.appendChild(messageDiv);
            scrollToBottom();
        }
        
        // Simple HTML escape
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Send message
        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message || isWaiting) return;
            
            // Add user message to chat
            addMessage('user', message);
            messageInput.value = '';
            isWaiting = true;
            sendBtn.disabled = true;
            
            // Show typing indicator
            showTyping();
            
            try {
                const formData = new FormData();
                formData.append('message', message);
                
                const response = await fetch('/send', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                removeTyping();
                addMessage('vexra', data.reply);
                
                // Update facts display if changed
                if (data.facts) {
                    document.querySelector('.facts-panel').innerHTML = `📝 ${Object.keys(data.facts).length} facts`;
                }
            } catch (error) {
                removeTyping();
                addMessage('vexra', `*frowns* Something went wrong... ${error.message}`);
            }
            
            isWaiting = false;
            sendBtn.disabled = false;
            messageInput.focus();
        }
        
        // Enter key to send
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
        
        // Facts modal
        function showFacts() {
            document.getElementById('factsModal').style.display = 'flex';
        }
        
        function closeModal() {
            document.getElementById('factsModal').style.display = 'none';
        }
        
        // Initial focus and scroll
        messageInput.focus();
        scrollToBottom();
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Vexra</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; background: #0f0f1a; color: white; margin: 0; padding: 20px; }
        .chat { max-width: 600px; margin: 0 auto; }
        .msg { margin: 10px 0; padding: 10px; border-radius: 10px; }
        .user { background: #6366f1; text-align: right; }
        .vexra { background: #2a2a3a; }
        input { width: 70%; padding: 10px; }
        button { padding: 10px 20px; background: #0f2fbd; color: white; border: none; cursor: pointer; }
        #messages { height: 400px; overflow-y: auto; margin-bottom: 20px; }
        .facts { font-size: 12px; margin-bottom: 10px; cursor: pointer; color: #a78bfa; }
        .thinking { opacity: 0.6; font-style: italic; }
    </style>
</head>
<body>
    <div class="chat">
        <h2>Vexra</h2>
        
        <div id="messages"></div>
        <input type="text" id="msg" placeholder="Type here..." autofocus>
        <button onclick="send()">Send</button>
    </div>
    <script>
        const messagesDiv = document.getElementById('messages');
        const msgInput = document.getElementById('msg');
        let currentStreamDiv = null;
        let currentStreamSpan = null;
        
        function addMessage(role, text) {
            const div = document.createElement('div');
            div.className = 'msg ' + role;
            div.innerHTML = '<b>' + (role == 'user' ? 'You' : 'Vexra') + ':</b> ' + text;
            messagesDiv.appendChild(div);
            div.scrollIntoView();
        }
        
        function startStreamingMessage() {
            currentStreamDiv = document.createElement('div');
            currentStreamDiv.className = 'msg vexra';
            currentStreamDiv.innerHTML = '<b>Vexra:</b> <span></span><span class="thinking">▊</span>';
            messagesDiv.appendChild(currentStreamDiv);
            currentStreamSpan = currentStreamDiv.querySelector('span');
            return currentStreamSpan;
        }
        
        function appendToStream(text) {
            if (currentStreamSpan) {
                currentStreamSpan.innerText += text;
                currentStreamDiv.scrollIntoView();
            }
        }
        
        function endStreamingMessage() {
            if (currentStreamDiv) {
                const thinkingSpan = currentStreamDiv.querySelector('.thinking');
                if (thinkingSpan) thinkingSpan.remove();
                currentStreamDiv = null;
                currentStreamSpan = null;
            }
        }
        
        async function send() {
            const msg = msgInput.value.trim();
            if (!msg) return;
            addMessage('user', msg);
            msgInput.value = '';
            
            startStreamingMessage();
            
            const formData = new FormData();
            formData.append('message', msg);
            
            try {
                const response = await fetch('/chat', { method: 'POST', body: formData });
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                
                let buffer = '';
                
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';
                    
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const data = line.slice(6);
                            if (data === '[DONE]') continue;
                            try {
                                const parsed = JSON.parse(data);
                                if (parsed.content) {
                                    appendToStream(parsed.content);
                                }
                            } catch(e) {}
                        }
                    }
                }
            } catch (error) {
                appendToStream('[Error connecting to server]');
            }
            
            endStreamingMessage();
        }
        
        async function showFacts() {
            const res = await fetch('/facts');
            const data = await res.json();
            alert('Facts I remember:\n' + JSON.stringify(data.facts, null, 2));
        }
        
        msgInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') send(); });
    </script>
</body>
</html>
<script>
    // Load greeting from server
    fetch('/greeting')
        .then(res => res.json())
        .then(data => {
            if (data.greeting && document.getElementById('messages').children.length === 0) {
                addMessage('vexra', data.greeting);
            }
        });
</script>

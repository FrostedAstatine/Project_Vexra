<!DOCTYPE html>
<html>
<head>
    <title>Vexra</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; background: #0f0f1a; color: white; margin: 0; padding: 20px; }
        .chat { max-width: 600px; margin: 0 auto; }
        .msg { margin: 10px 0; padding: 10px; border-radius: 10px; word-wrap: break-word; }
        .user { background: #6366f1; text-align: right; }
        .vexra { background: #2a2a3a; }
        input { width: 70%; padding: 10px; margin: 10px 0; }
        button { padding: 10px 20px; background: #6366f1; color: white; border: none; cursor: pointer; }
        #messages { height: 400px; overflow-y: auto; margin-bottom: 20px; }
        .clear { font-size: 12px; margin-bottom: 10px; cursor: pointer; color: #f87171; display: inline-block; }
        .typing-cursor { opacity: 0.6; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 0.6; } 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div class="chat">
        <h2>Vexra</h2>
        <div>
            <span class="clear" onclick="clearChat()">🗑 clear chat</span>
        </div>
        <div id="messages"></div>
        <input type="text" id="msg" placeholder="Type here..." autofocus>
        <button onclick="send()">Send</button>
    </div>
    <script>
        const messagesDiv = document.getElementById('messages');
        const msgInput = document.getElementById('msg');
        let currentStreamDiv = null;
        let currentFullText = '';

        function addMessage(role, text) {
            const div = document.createElement('div');
            div.className = 'msg ' + role;
            div.innerHTML = '<b>' + (role == 'user' ? 'You' : 'Vexra') + ':</b> <span class="message-text"></span>';
            const textSpan = div.querySelector('.message-text');
            textSpan.innerText = text;
            messagesDiv.appendChild(div);
            scrollToBottom();
        }

        function scrollToBottom() {
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function startStreamingMessage() {
            currentStreamDiv = document.createElement('div');
            currentStreamDiv.className = 'msg vexra';
            currentStreamDiv.innerHTML = '<b>Vexra:</b> <span class="message-text"></span><span class="typing-cursor">▊</span>';
            messagesDiv.appendChild(currentStreamDiv);
            scrollToBottom();
            currentFullText = '';
        }

        function appendToStream(text) {
            const textSpan = currentStreamDiv.querySelector('.message-text');
            if (textSpan) {
                currentFullText += text;
                textSpan.innerText = currentFullText;
                scrollToBottom();
            }
        }

        function endStreamingMessage() {
            if (currentStreamDiv) {
                const cursor = currentStreamDiv.querySelector('.typing-cursor');
                if (cursor) cursor.remove();
                currentStreamDiv = null;
            }
        }

        async function loadHistory() {
            const response = await fetch('/history');
            const data = await response.json();
            messagesDiv.innerHTML = '';
            for (const msg of data.history) {
                addMessage(msg.role, msg.message);
            }
            scrollToBottom();
        }

        async function clearChat() {
            if (confirm('Clear all messages for everyone?')) {
                await fetch('/clear', { method: 'POST' });
                await loadHistory();
            }
        }

        async function send() {
            const msg = msgInput.value.trim();
            if (!msg) return;
            addMessage('user', msg);
            msgInput.value = '';
            startStreamingMessage();

            const formData = new FormData();
            formData.append('message', msg);

            try {
                const response = await fetch('/chat', { method: 'POST', body: formData });
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const data = line.slice(6);
                            if (data === '[DONE]') continue;
                            try {
                                const parsed = JSON.parse(data);
                                if (parsed.content) {
                                    appendToStream(parsed.content);
                                }
                            } catch(e) {}
                        }
                    }
                }
            } catch (error) {
                appendToStream('[Error connecting to server]');
            }
            endStreamingMessage();
            await loadHistory();
        }

        msgInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') send(); });

        loadHistory();
    </script>
</body>
</html>
